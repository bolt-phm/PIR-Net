name: Feature Request
description: Propose an improvement for PIR-Net experiments or tooling
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Change
      description: Describe the expected behavior or API
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Reproducibility / Compatibility Impact
      description: Any effects on existing experiments, configs, or baselines?